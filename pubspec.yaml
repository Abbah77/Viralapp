name: reelz
description: Premium short video app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video — fastest available, hardware accelerated
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # HTTP
  dio: ^5.4.0

  # Image caching
  cached_network_image: ^3.3.1

  # State
  provider: ^6.1.1

  # Premium animations
  flutter_animate: ^4.5.0

  # Fonts
  google_fonts: ^6.2.1

  # Haptics — using Flutter built-in HapticFeedback (no package needed)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
