name: reelz
description: High performance short video app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video player - fastest available
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # HTTP client - fastest
  dio: ^5.4.0

  # Image caching
  cached_network_image: ^3.3.1

  # State management
  provider: ^6.1.1

  # Smooth animations
  flutter_animate: ^4.5.0

  # Icons
  iconsax: ^0.0.8

  # Safe area + status bar
  flutter_statusbarcolor_ns: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
